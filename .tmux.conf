set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set-option -g status-position top
# remap prefix from 'C-b' to 'C-Space'
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# split panes using | and -
bind _ split-window -h
bind - split-window -v
unbind '"'
unbind %

bind h select-window -p
bind l select-window -n
bind Space choose-tree -Zw
bind o resize-pane -Z
bind-key w command-prompt "rename-window %%"
unbind n
unbind p
unbind z

# force a reload of the config file
# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# quick pane cycling
# unbind ^A
# bind ^A select-pane -t :.+

# smart pane switching with awareness of vim splits
# probably can replace with a plugin
# bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
# bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j) || tmux select-pane -D"
# bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k) || tmux select-pane -U"
# bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"
# bind -n C-\ run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys 'C-\\') || tmux select-pane -l"

# resize pane
# bind -n C-Down resize-pane -D 5
# bind -n C-Up resize-pane -U 5
# bind -n C-Right resize-pane -R 10
# bind -n C-Left resize-pane -L 10

bind -n S-Down resize-pane -D 1
bind -n S-Up resize-pane -U 1
bind -n S-Right resize-pane -R 2
bind -n S-Left resize-pane -L 2
# tmux status bar color
set-option -g status-keys "emacs"
set -g status-left-length 50
set -g status-right " Show Terminal #(date '+%a, %b %d - %I:%M') "


bind c new-window -c "#{pane_current_path}"
set -g base-index 1
set -g renumber-windows on

bind-key b break-pane -d
bind-key C-j choose-tree

# Use vim keybindings in copy mode
set-window-option -g mode-keys vi
bind-key / copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# Setup 'v' to begin selection as in Vim
# bind-key -t vi-copy v begin-selection
# bind-key -t vi-copy y copy-pipe "reattach-to-user-namespace pbcopy"
#
# # Update default binding of `Enter` to also use copy-pipe
# unbind -t vi-copy Enter
# bind-key -t vi-copy Enter copy-pipe "reattach-to-user-namespace pbcopy"
#
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

set -g mouse on 

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10
set -g focus-events on

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin '2kabhishek/tmux2k'
set -g @plugin 'tmux-plugins/tmux-open'

# theme colors

set -g @tmux2k-theme 'onedark icons'
set -g @tmux2k-icons-only true
set -g @tmux2k-text '#17E3FF'
set -g @tmux2k-bg-main '#002F47'
# set -g @tmux2k-bg-main '#00537c'
set -g @tmux2k-bg-alt '#00537c'
set -g @tmux2k-yellow '#30ffc8'
set -g @tmux2k-light-yellow '#30ffc8'
set -g @tmux2k-black '#002F47'
set -g @tmux2k-white '#0db9d7'
set -g @tmux2k-blue '#17E3FF'
# set -g @tmux2k-blue '#0db9d7'
set -g @tmux2k-right-plugins "battery"
set -g @tmux2k-left-plugins "wimdow"
set -g @tmux2k-battery-colors "black blue"
# set -g @tmux2k-ram-colors "black blue"
set -g @tmux2k-right-sep ''
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
